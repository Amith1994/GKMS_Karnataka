name: Build & Release GKMS Karnataka

on:
  push:
    tags:
      - 'v*'  # Triggers when you push a tag like v1.0.0, v1.1.0, etc.

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write  # Needed to create releases
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Windows executable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish
      
      - name: List built files
        run: dir dist
